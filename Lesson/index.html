<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - School Dashboard</title>
    <style>
        body {
            font-family: 'Khmer OS Battambang', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .menu-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: red; margin-bottom: 20px; }
        .btn {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 10px 0;
            background-color: red;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: darkred;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h2>មឺនុយមេ (Main Menu)</h2>
        
        <a href="ex2.html" class="btn">ទៅកាន់ទំព័រ ex2</a>
        <a href="ex3.html" class="btn">ទៅកាន់ទំព័រ ex3</a>
    </div>

</body>
</html>
